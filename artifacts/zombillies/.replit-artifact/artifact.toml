kind = "mobile"
previewPath = "/"
title = "Zombillies"
version = "1.0.0"
id = "artifacts/zombillies"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 23156

[services.development]
run = "pnpm --filter @workspace/zombillies run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zombillies", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/zombillies", "run", "serve" ]

[services.env]
PORT = "23156"
BASE_PATH = "/"
